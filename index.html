<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP Tracker</title>

    <link rel="stylesheet" href="./styles.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <main>
      <div class="banner-box">
        <div class="search-and-info-sections">
          <h1>IP Address Tracker</h1>

          <form class="ip-search-form">
            <input
              type="text"
              placeholder="Enter IP or domain name..."
              id="search-input"
              autocomplete="off"
            />
            <button type="submit">
              <img src="./path.png" alt="button-arrow" />
            </button>
          </form>

          <div class="output-window">
            <div class="info-box">
              <h2 class="name-of-info">IP Address</h2>
              <p class="info" id="ip"></p>
            </div>

            <div class="info-box">
              <h2 class="name-of-info">Location</h2>
              <div class="info">
                <p class="info-adress-first-part" id="city"></p>
                <br class="responsive-br" />
                <p class="info-adress-second-part" id="country-and-postal"></p>
              </div>
            </div>

            <div class="info-box">
              <h2 class="name-of-info">Timezone</h2>
              <p class="info" id="info-time-zone"></p>
            </div>

            <div class="info-box">
              <h2 class="name-of-info">ISP</h2>
              <div class="info">
                <p
                  class="company-name-first-part"
                  id="company-name-first-part"
                ></p>
                <br class="responsive-br" />
                <p
                  class="company-name-second-part"
                  id="company-name-second-part"
                ></p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="map-box" id="map"></div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
